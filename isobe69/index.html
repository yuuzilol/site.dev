/* === BGM制御ロジック === */
const bgm = document.getElementById('bgm');
const bgmBtn = document.getElementById('bgm-toggle');

bgmBtn.addEventListener('click', function() {
    if (bgm.paused) {
        bgm.play();
        bgmBtn.textContent = '🎵 BGM ON';
        bgmBtn.classList.add('playing');
    } else {
        bgm.pause();
        bgmBtn.textContent = '🎵 BGM OFF';
        bgmBtn.classList.remove('playing');
    }
});

/* === 既存のスクリプト (サイトステータスチェック & タイトルスクロール) START === */
// 元のコードを関数化して、homeページがロードされた後に実行できるようにします
const checkAllSiteStatus = function() {
    // URLのリストを定義 (元のコードには明示的なリストはなかったため、カード要素から動的に取得します)
    const cardElements = document.querySelectorAll('#content-area .link-card[data-url]');
    
    if (cardElements.length === 0) return; // 要素がなければ何もしない

    // タイムアウト設定
    const TIMEOUT_MS = 8000;

    // fetchStatus 関数はそのまま利用
    cardElements.forEach(card => {
        const url = card.getAttribute('data-url');
        const statusTextElement = card.querySelector('.status-text');
        const statusIndicatorElement = card.querySelector('.status-indicator');
        
        if (!url || !statusTextElement) return;

        // クラスをリセット
        card.classList.remove('status-ok', 'status-down');
        card.classList.add('status-loading');
        statusTextElement.textContent = 'Loading...';

        const checkStatus = async () => {
            const startTime = Date.now();
            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), TIMEOUT_MS);
            
            try {
                
                // 外部サイトのURLを除外
                if (statusTextElement.textContent === '外部サイト') {
                    card.classList.remove('status-loading');
                    return;
                }

                // サーバーサイドでないため、CORS回避のためのプロキシが必要になりますが、
                // 実行環境がないため、ここでは元のコードのfetchを再現する形をとります。
                // 実際のサーバー上ではCORSプロキシURLを設定するか、サーバー側でチェックを行う必要があります。
                const response = await fetch(url, {
                    signal: controller.signal,
                    mode: 'no-cors' // 簡易チェックのためno-corsモードを試みますが、ステータスは取得できません
                });
                
                clearTimeout(timeoutId);

                const endTime = Date.now();
                const pingTime = endTime - startTime;

                card.classList.remove('status-loading');

                // no-corsではresponse.okやstatusが使えないため、簡易的に成功判定をシミュレート
                if (pingTime < TIMEOUT_MS) {
                    card.classList.add('status-ok');
                    statusTextElement.textContent = `UP (${pingTime}ms)`;
                } else {
                    card.classList.add('status-down');
                    statusTextElement.textContent = `DOWN (Timed Out)`;
                }
                
                // 元のコードの完全な再現は不可能ですが、SPAとして再初期化されるようにしました。
                // 実際の稼働状況サイトでは、この fetch の部分をサーバー側で処理する必要があります。

            } catch(err) {
                clearTimeout(timeoutId);
                card.classList.remove('status-loading');
                card.classList.add('status-down');
                statusTextElement.textContent = err.name==='AbortError'?`DOWN (Timeout ${TIMEOUT_MS/1000}s)`:'DOWN (Check Failed)';
            }
        };

        // ページロード時と30秒ごとにチェック
        checkStatus();
        setInterval(checkStatus, 30000);
    });
};

const setupHiddenSectionToggle = function() {
    const showHiddenBtn = document.getElementById('show-hidden-btn');
    const hiddenSection = document.getElementById('hidden-section');

    if (showHiddenBtn && hiddenSection) {
        // 初期状態を隠す
        hiddenSection.style.display = 'none';

        showHiddenBtn.addEventListener('click', function() {
            if (hiddenSection.style.display === 'none' || hiddenSection.style.display === '') {
                hiddenSection.style.display = 'block';
                showHiddenBtn.textContent = '閉じる';
            } else {
                hiddenSection.style.display = 'none';
                showHiddenBtn.textContent = 'さらに表示';
            }
        });
    }
};

const initializeHomePageScripts = function() {
    // コンテンツがロードされた後に実行する必要があるスクリプト
    checkAllSiteStatus();
    setupHiddenSectionToggle();
};

// タイトルスクロールはコンテンツエリアとは独立しているため、DOMロード時に一度だけ実行します
const fullTitle = "★自作サイト/運営サイト一覧 ★ 極秘 "; 
let scrollPos = 0;

function scrollTitle() {
    const scrollingTitle = fullTitle.substring(scrollPos) + fullTitle.substring(0, scrollPos);
    document.title = scrollingTitle;

    scrollPos++;
    if (scrollPos >= fullTitle.length) {
        scrollPos = 0;
    }

    // 0.2秒ごとにタイトルを更新 (スクロール速度の調整)
    setTimeout(scrollTitle, 200); 
}

    /**
     * コンテンツを切り替える関数
     * @param {string} pageName - 表示したいページのキー ('home', 'profile' など)
     */
    function loadPage(pageName) {
        // ページ内容をクリア
        contentArea.innerHTML = ''; 
        
        if (pages[pageName]) {
            // 1. コンテンツの挿入
            contentArea.innerHTML = pages[pageName];
            
            // 2. アクティブボタンのスタイル変更
            navButtons.forEach(btn => {
                if (btn.getAttribute('data-page') === pageName) {
                    btn.classList.add('active');
                } else {
                    btn.classList.remove('active');
                }
            });

            // 3. ブラウザ履歴の更新 (URLのハッシュを変更)
            // home ページの場合はハッシュを削除し、それ以外はハッシュを追加
            const newHash = pageName === 'home' ? '' : `#${pageName}`;
            history.pushState({page: pageName}, '', newHash);

            // 4. ホームページがロードされた場合のみ、既存のスクリプトを再初期化
            if (pageName === 'home') {
                // スクリプトの実行を少し遅延させて、DOMの描画を待つ
                setTimeout(initializeHomePageScripts, 50); 
            }

            // 5. ページトップへスクロール
            window.scrollTo(0, 0);

        } else {
             // 404的なエラーページ表示
             contentArea.innerHTML = `<header><h1>ページが見つかりません</h1><p>お探しのページは存在しないか、移動されました。</p></header>`;
        }
    }

    // ナビゲーションボタンにイベントリスナーを設定
    navButtons.forEach(button => {
        button.addEventListener('click', function() {
            const page = this.getAttribute('data-page');
            loadPage(page);
        });
    });
    
    // ブラウザの「戻る」「進む」ボタンに対応
    window.addEventListener('popstate', function(event) {
        // ハッシュからページ名を取得
        const hash = window.location.hash.replace('#', '');
        // ハッシュがあればそれを、なければ 'home' をロード
        loadPage(hash || 'home');
    });

    // 初期ロード: URLのハッシュがあればそれを、なければ 'home' を表示
    const initialHash = window.location.hash.replace('#', '');
    loadPage(initialHash || 'home');
    
    // タイトルスクロールの開始 (コンテンツとは独立して動作)
    scrollTitle();
});

/* === SPA ロジック END === */

    </script>
    
  </body>
</html>
